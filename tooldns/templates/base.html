<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_name }}{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
</head>
<body>
  <nav>
    <div class="nav-brand">
      <span class="nav-logo">⚡</span>
      <span>{{ app_name }}</span>
    </div>
    <div class="nav-links">
      <a href="/ui" class="{% if page == 'dashboard' %}active{% endif %}">Home</a>
      <a href="/ui/marketplace" class="{% if page == 'marketplace' %}active{% endif %}">🛒 Add Tools</a>
      <a href="/ui/tools" class="{% if page == 'tools' %}active{% endif %}">Browse Tools</a>
      <a href="/ui/sources" class="{% if page == 'sources' %}active{% endif %}">Sources</a>
      <a href="/ui/stats" class="{% if page == 'stats' %}active{% endif %}">Savings</a>
      <a href="/ui/keys" class="{% if page == 'keys' %}active{% endif %}">API Keys</a>
      <a href="/ui/settings" class="{% if page == 'settings' %}active{% endif %}">⚙ Settings</a>
      <a href="/ui/deploy" class="{% if page == 'deploy' %}active{% endif %}">🚀 Deploy</a>
      <a href="/ui/client" target="_blank" class="nav-portal-link">Client Portal ↗</a>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="footer-inner">
      <span>{{ app_name }} — {{ app_tagline }}</span>
      <div class="footer-links">
        <a href="/docs">API Docs</a>
        <a href="/ui/pricing">Pricing</a>
        <a href="{{ github_url }}" target="_blank">GitHub</a>
      </div>
    </div>
  </footer>
</body>
</html>
