<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_name }} — My Dashboard</title>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3248; --text: #e2e8f0; --text-dim: #94a3b8;
      --accent: #6366f1; --ok: #22c55e; --warn: #f59e0b; --error: #ef4444;
      --radius: 8px; --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "JetBrains Mono", "Fira Code", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font);
           font-size: 14px; line-height: 1.6; min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }

    /* Header */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .brand { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .brand-badge { background: rgba(99,102,241,0.15); color: #a78bfa;
                   border: 1px solid rgba(99,102,241,0.3); border-radius: 12px;
                   font-size: 11px; font-weight: 600; padding: 2px 10px; }

    /* Main */
    main { max-width: 860px; margin: 0 auto; padding: 40px 20px; }

    /* Login box */
    .login-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px; max-width: 480px; margin: 60px auto;
      text-align: center;
    }
    .login-icon { font-size: 48px; margin-bottom: 16px; }
    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .login-sub { color: var(--text-dim); font-size: 13px; margin-bottom: 28px; line-height: 1.5; }
    .login-form { display: flex; flex-direction: column; gap: 12px; }
    .login-input {
      width: 100%; padding: 12px 16px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text); font-size: 14px; font-family: var(--mono);
      text-align: center; letter-spacing: 0.5px;
    }
    .login-input:focus { outline: none; border-color: var(--accent); }
    .login-btn {
      width: 100%; padding: 12px; border-radius: var(--radius);
      background: var(--accent); color: #fff; border: none; font-size: 14px;
      font-weight: 600; cursor: pointer; font-family: var(--font);
    }
    .login-btn:hover { background: #818cf8; }
    .login-error { color: var(--error); font-size: 13px; padding: 8px; }

    /* Dashboard */
    .dash-header { margin-bottom: 28px; }
    .dash-greeting { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .dash-sub { color: var(--text-dim); font-size: 13px; }
    .dash-plan { display: inline-block; background: rgba(99,102,241,0.15);
                 color: #a78bfa; border: 1px solid rgba(99,102,241,0.3);
                 border-radius: 12px; font-size: 11px; font-weight: 600;
                 padding: 2px 10px; margin-left: 8px; text-transform: uppercase; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                  gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border);
                 border-radius: var(--radius); padding: 20px; text-align: center; }
    .stat-number { font-size: 32px; font-weight: 700; color: var(--accent); line-height: 1; }
    .stat-number.green { color: var(--ok); }
    .stat-number.warn { color: var(--warn); }
    .stat-label { color: var(--text-dim); font-size: 11px; margin-top: 6px;
                  text-transform: uppercase; letter-spacing: .5px; }

    /* Usage bar */
    .usage-card { background: var(--surface); border: 1px solid var(--border);
                  border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .usage-card h2 { font-size: 13px; font-weight: 600; color: var(--text-dim);
                     text-transform: uppercase; letter-spacing: .5px; margin-bottom: 16px; }
    .usage-label { display: flex; justify-content: space-between;
                   font-size: 13px; margin-bottom: 8px; }
    .usage-track { height: 10px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
    .usage-fill { height: 100%; border-radius: 5px;
                  background: linear-gradient(90deg, var(--accent), #a78bfa); transition: width .5s; }
    .usage-fill.warn { background: linear-gradient(90deg, var(--warn), #fbbf24); }
    .usage-fill.danger { background: linear-gradient(90deg, var(--error), #f87171); }
    .usage-note { font-size: 12px; color: var(--text-dim); margin-top: 8px; }

    /* Key display */
    .key-card { background: var(--surface); border: 1px solid var(--border);
                border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .key-card h2 { font-size: 13px; font-weight: 600; color: var(--text-dim);
                   text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
    .key-row { display: flex; align-items: center; gap: 10px;
               background: var(--surface2); padding: 10px 14px;
               border-radius: var(--radius); border: 1px solid var(--border); }
    .key-val { flex: 1; font-family: var(--mono); font-size: 12px; color: var(--text-dim);
               word-break: break-all; }
    .btn-sm { padding: 5px 12px; border-radius: var(--radius); border: 1px solid var(--border);
              background: var(--surface2); color: var(--text); cursor: pointer;
              font-size: 12px; white-space: nowrap; }
    .btn-sm:hover { background: var(--border); }

    /* How to connect */
    .connect-card { background: var(--surface); border: 1px solid var(--border);
                    border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .connect-card h2 { font-size: 13px; font-weight: 600; color: var(--text-dim);
                       text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
    pre { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
          padding: 14px 16px; font-family: var(--mono); font-size: 12px; color: var(--text-dim);
          overflow-x: auto; white-space: pre; }
    .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
    .tab { padding: 5px 12px; border-radius: var(--radius); border: 1px solid var(--border);
           background: var(--surface2); color: var(--text-dim); cursor: pointer; font-size: 12px; }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Logout */
    .logout-link { font-size: 12px; color: var(--text-dim); cursor: pointer; }
    .logout-link:hover { color: var(--text); }

    footer { text-align: center; padding: 32px 20px; color: var(--text-dim);
             font-size: 12px; border-top: 1px solid var(--border); margin-top: 40px; }
  </style>
</head>
<body>

<header>
  <div class="brand">⚡ {{ app_name }} <span class="brand-badge">Client Portal</span></div>
  <div id="logout-area"></div>
</header>

<main>
  <!-- Login form — shown until key is verified -->
  <div class="login-box" id="login-box">
    <div class="login-icon">🔑</div>
    <div class="login-title">Access Your Dashboard</div>
    <div class="login-sub">
      Enter your {{ app_name }} API key to see your usage stats,
      remaining searches, and how to connect your AI agent.
    </div>
    <div class="login-form">
      <input type="password" class="login-input" id="api-key-input"
             placeholder="td_xxxxxxxxxxxxxxxxxx"
             autocomplete="off" spellcheck="false">
      <button class="login-btn" onclick="loadDashboard()">View My Dashboard →</button>
      <div class="login-error" id="login-error" style="display:none"></div>
    </div>
  </div>

  <!-- Dashboard — hidden until key verified -->
  <div id="dashboard" style="display:none"></div>
</main>

<footer>
  {{ app_name }} — {{ app_tagline }}
  &nbsp;|&nbsp; <a href="/docs" target="_blank">API Docs</a>
  &nbsp;|&nbsp; <a href="/ui/pricing">Pricing</a>
</footer>

<script>
const BASE = window.location.origin;

function loadDashboard() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;

  document.querySelector('.login-btn').textContent = 'Loading…';
  document.getElementById('login-error').style.display = 'none';

  fetch(`${BASE}/ui/client/stats`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key })
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      document.getElementById('login-error').textContent = data.error;
      document.getElementById('login-error').style.display = 'block';
      document.querySelector('.login-btn').textContent = 'View My Dashboard →';
      return;
    }
    // Store key in sessionStorage (cleared when tab closes)
    sessionStorage.setItem('tdKey', key);
    renderDashboard(data, key);
  })
  .catch(() => {
    document.getElementById('login-error').textContent = 'Could not reach server. Try again.';
    document.getElementById('login-error').style.display = 'block';
    document.querySelector('.login-btn').textContent = 'View My Dashboard →';
  });
}

// Auto-login if key in session
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('tdKey');
  if (saved) {
    document.getElementById('api-key-input').value = saved;
    loadDashboard();
  }
  document.getElementById('api-key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadDashboard();
  });
});

function renderDashboard(d, key) {
  document.getElementById('login-box').style.display = 'none';
  document.getElementById('logout-area').innerHTML =
    `<span class="logout-link" onclick="logout()">Sign out</span>`;

  const pct = d.monthly_limit > 0 ? Math.min(Math.round(d.search_count / d.monthly_limit * 100), 100) : 0;
  const fillClass = pct >= 90 ? 'danger' : pct >= 70 ? 'warn' : '';
  const limitLabel = d.monthly_limit > 0 ? `${d.search_count} / ${d.monthly_limit}` : `${d.total_searches} (unlimited)`;
  const limitNote = d.monthly_limit > 0
    ? (pct >= 90 ? '⚠ Approaching limit — contact us to upgrade.' : `${d.monthly_limit - d.search_count} searches remaining this month.`)
    : 'Your plan has unlimited searches.';

  const masked = key.substring(0, 6) + '••••••••••••' + key.slice(-4);

  document.getElementById('dashboard').innerHTML = `
    <div class="dash-header">
      <div class="dash-greeting">
        Welcome back, ${escHtml(d.name)}
        <span class="dash-plan">${escHtml(d.plan)}</span>
      </div>
      <div class="dash-sub">Last active: ${d.last_used_at ? d.last_used_at.substring(0,10) : 'never'}</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number">${fmtNum(d.total_searches)}</div>
        <div class="stat-label">Total Searches</div>
      </div>
      <div class="stat-card">
        <div class="stat-number ${pct >= 90 ? 'warn' : ''}">${d.monthly_limit > 0 ? d.search_count : '∞'}</div>
        <div class="stat-label">This Month</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${d.monthly_limit > 0 ? d.monthly_limit : '∞'}</div>
        <div class="stat-label">Monthly Limit</div>
      </div>
      <div class="stat-card">
        <div class="stat-number green">${fmtNum(d.tokens_saved)}</div>
        <div class="stat-label">Tokens Saved</div>
      </div>
    </div>

    ${d.monthly_limit > 0 ? `
    <div class="usage-card">
      <h2>Monthly Usage</h2>
      <div class="usage-label">
        <span>${limitLabel} searches used</span>
        <span>${pct}%</span>
      </div>
      <div class="usage-track">
        <div class="usage-fill ${fillClass}" style="width:${pct}%"></div>
      </div>
      <div class="usage-note">${limitNote}</div>
    </div>` : ''}

    <div class="key-card">
      <h2>Your API Key</h2>
      <div class="key-row">
        <span class="key-val" id="key-display">${masked}</span>
        <button class="btn-sm" onclick="toggleKey('${escHtml(key)}', this)">Reveal</button>
      </div>
    </div>

    <div class="connect-card">
      <h2>Connect Your AI Agent</h2>
      <div class="tabs">
        <div class="tab active" onclick="showTab('curl', this)">curl</div>
        <div class="tab" onclick="showTab('python', this)">Python</div>
        <div class="tab" onclick="showTab('js', this)">JavaScript</div>
      </div>
      <pre id="tab-curl">curl -X POST ${BASE}/v1/search \\
  -H "Authorization: Bearer ${escHtml(key)}" \\
  -H "Content-Type: application/json" \\
  -d '{"query": "send an email", "top_k": 2}'</pre>
      <pre id="tab-python" style="display:none">import requests

response = requests.post(
    "${BASE}/v1/search",
    headers={"Authorization": "Bearer ${escHtml(key)}"},
    json={"query": "send an email", "top_k": 2}
)
tool = response.json()["results"][0]
print(tool["name"], tool["description"])</pre>
      <pre id="tab-js" style="display:none">const res = await fetch("${BASE}/v1/search", {
  method: "POST",
  headers: {
    "Authorization": "Bearer ${escHtml(key)}",
    "Content-Type": "application/json"
  },
  body: JSON.stringify({ query: "send an email", top_k: 2 })
});
const { results } = await res.json();</pre>
    </div>
  `;

  document.getElementById('dashboard').style.display = 'block';
}

function showTab(name, el) {
  ['curl','python','js'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

let keyRevealed = false;
function toggleKey(fullKey, btn) {
  keyRevealed = !keyRevealed;
  document.getElementById('key-display').textContent = keyRevealed
    ? fullKey
    : fullKey.substring(0, 6) + '••••••••••••' + fullKey.slice(-4);
  btn.textContent = keyRevealed ? 'Hide' : 'Reveal';
}

function logout() {
  sessionStorage.removeItem('tdKey');
  location.reload();
}

function fmtNum(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
