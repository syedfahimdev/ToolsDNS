name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Check imports
        run: |
          python3 -c "from tooldns.api import router; print('api OK')"
          python3 -c "from tooldns.auth import require_api_key, init_auth; print('auth OK')"
          python3 -c "from tooldns.discover import discover_from_url; print('discover OK')"
          python3 -c "from tooldns.config import settings; print('config OK')"
          python3 -c "from tooldns.search import SearchEngine; print('search OK')"
          python3 -c "from tooldns.ingestion import IngestionPipeline; print('ingestion OK')"
          python3 -c "from tooldns.mcp_server import mcp; print('mcp_server OK')"

      - name: Verify CLI entry points
        run: |
          python3 -c "from tooldns.cli import main; print('CLI entry point OK')"

      - name: Test discover module
        run: |
          python3 -c "
          from tooldns.discover import discover_from_url
          r = discover_from_url('https://smithery.ai/server/@modelcontextprotocol/server-github')
          assert r.get('detected_type') == 'Smithery MCP Server', r
          r = discover_from_url('https://www.npmjs.com/package/@modelcontextprotocol/server-filesystem')
          assert r.get('detected_type') == 'npm MCP Package', r
          print('All discover tests passed')
          "

      - name: Check for old branding (ToolDNS without the s)
        run: |
          # Match "ToolDNS" NOT followed by "s" (i.e., the old incorrect name)
          if grep -rn --include="*.py" --include="*.html" --include="*.md" \
               -P "ToolDNS(?!s)" . | grep -v ".git"; then
            echo "ERROR: Found old 'ToolDNS' branding — use 'ToolsDNS'"
            exit 1
          fi
          echo "Branding check passed"

      - name: Check no .env committed
        run: |
          if git ls-files | grep -E "^\.env$|^\.env\.local$|^\.env\.production$"; then
            echo "ERROR: .env file committed — remove it!"
            exit 1
          fi
          echo ".env check passed"
